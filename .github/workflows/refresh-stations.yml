name: Atualizar dados de estações

on:
  schedule:
    - cron: '0 3 * * *'   # diariamente às 03:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Gerar snapshot de estações (NOAA ISD)
        run: python scripts/build_stations.py
      - name: Commit se houver mudança
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/stations.json
          git diff --cached --quiet || git commit -m "chore: atualiza snapshot de estações (NOAA ISD)"
          git push
